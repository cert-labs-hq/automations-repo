name: 'Drift Fixer'
description: 'Detects lockfile drift and opens a PR if needed'
inputs:
  token:
    description: 'Token to create PR (PAT or GitHub App)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Regenerate Lockfile
      run: npm install --package-lock-only
      shell: bash

    - name: Check for Drift
      id: check
      run: |
        if [[ -n $(git status --porcelain package-lock.json) ]]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Create Pull Request
      if: steps.check.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ inputs.token }}
        commit-message: "chore: automated lockfile sync"
        title: "🤖 Automated Lockfile Fix"
        body: "Drift detected by Universal Orchestrator. Please review and merge."
        branch: "bot/drift-fix-${{ github.run_id }}"