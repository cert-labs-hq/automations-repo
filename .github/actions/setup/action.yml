name: 'Smart Setup'
description: 'Standardized setup with built-in caching'
inputs:
  node-version:
    description: 'Version of Node to use'
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      # actions/setup-node@v6.0.0
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version: ${{ inputs.node-version }}

    # THIS IS THE PART TO PRACTICE
    - name: Cache Node Modules
      # actions/cache@v4.2.2
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
      id: node-cache
      with:
        path: '**/node_modules'
        # The Key is the most important part of Domain 1 & 3
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install Dependencies
      # We only run this if there was a cache miss
      if: steps.node-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    - name: 📊 Check Dependency Size
      shell: bash
      run: |
        echo "### Dependency Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **NPM Cache Size:** $(du -sh ~/.npm | cut -f1)" >> $GITHUB_STEP_SUMMARY
        echo "- **Node Modules Size:** $(du -sh node_modules | cut -f1)" >> $GITHUB_STEP_SUMMARY