name: 'Smart Setup'
description: 'Standardized setup with built-in caching'
inputs:
  node-version:
    description: 'Version of Node to use'
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      # actions/setup-node@v6.0.0
      uses: actions/setup-node@125fa4c58f96e45300f898a1a39d89196b68a4d7
      with:
        node-version: ${{ inputs.node-version }}

    # THIS IS THE PART TO PRACTICE
    - name: Cache Node Modules
      # actions/cache@v4.2.2
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
      id: node-cache
      with:
        path: '**/node_modules'
        # The Key is the most important part of Domain 1 & 3
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install Dependencies
      # We only run this if there was a cache miss
      if: steps.node-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci