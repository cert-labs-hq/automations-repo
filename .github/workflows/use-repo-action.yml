name: use repo action
on: [workflow_dispatch] # workflow_dispatch allows manual triggers in the UI


jobs:
  test-action:
    runs-on: ubuntu-latest# Mandatory for local actions
    steps:
    - name: Run single repo action
      id: versioning # You need an ID to capture outputs
      uses: cert-labs-hq/get-version@v1.0.0 # Using the version generator action from the same repo
      with:
          who-to-greet: "GitHub Actions User" # Example of passing an input to the action