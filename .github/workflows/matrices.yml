name: matrices
on: workflow_dispatch

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 🧪 Don't stop if one OS fails; we want full results
      max-parallel: 2   # 💰 Save concurrency for other developers
      matrix:
        os: [ubuntu-latest, windows-2025]
        node: [18, 20, 22]
        # 1. Exclude a problematic combination
        exclude:
          - os: windows-2025
            node: 18
        # 2. Add an "Extra" job that isn't in the standard product
        include:
          - os: ubuntu-latest
            node: 20
            experimental: true # This variable only exists for this specific job

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ matrix.node }}
      - name: Experimental Check
        if: ${{ matrix.experimental == true }}
        run: echo "Running special e53b83947a5a98c8d113130e565377fae1a50d02fxperimental tests..."

  build-sim:
    runs-on: ${{ matrix.my_custom_os }} # Accessing a custom key
    strategy:
      matrix:
        # You define the keys here:
        my_custom_os: [ubuntu-latest, windows-latest]
        foo: [18, 20]
        
    steps:
      - run: echo "Running on ${{ matrix.my_custom_os }} with Node ${{ matrix.foo }}"

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2025]
        node: [20, 22]
        # 🛡️ INCLUDE logic: Add a variable to a specific match
        include:
          - os: windows-2025
            node: 22
            is_canary: true
            extra_flag: "--force-gpu"
            
    steps:
      - name: Environment Report
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Node: ${{ matrix.node }}"
          # This only prints on the specific Windows-Node22 combination
          echo "Extra Flag: ${{ matrix.extra_flag }}"

      - name: Conditional Step
        if: ${{ matrix.is_canary == true }}
        run: echo "Running special Canary build logic..."

  # Using an output to define two matrices
  define-matrix:
    runs-on: ubuntu-latest

    outputs:
      colors: ${{ steps.colors.outputs.colors }}

    steps:
      - name: Define Colors
        id: colors
        run: |
          echo 'colors=["red", "green", "blue"]' >> "$GITHUB_OUTPUT"

  produce-artifacts:
    runs-on: ubuntu-latest
    needs: define-matrix
    strategy:
      matrix:
        color: ${{ fromJSON(needs.define-matrix.outputs.colors) }}

    steps:
      - name: Define Color
        env:
          color: ${{ matrix.color }}
        run: |
          echo "$color" > color
      - name: Produce Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.color }}
          path: color

  consume-artifacts:
    runs-on: ubuntu-latest
    needs:
    - define-matrix
    - produce-artifacts
    strategy:
      matrix:
        color: ${{ fromJSON(needs.define-matrix.outputs.colors) }}

    steps:
    - name: Retrieve Artifact
      uses: actions/download-artifact@v5
      with:
        name: ${{ matrix.color }}

    - name: Report Color
      run: |
        cat color