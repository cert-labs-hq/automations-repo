name: Compliance Reporting

on:
  workflow_run:
    workflows: ["node build"] # MUST match the 'name' in a workflow
    types:
      - completed

jobs:
  analyze-compliance:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download Artifact from Parent
        uses: actions/upload-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #v8.0.0
        with:
          name: compliance-data
          # This is the "magic" input for workflow_run
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: parent-reports

      - name: Process Reports
        run: |
          echo "### 🛡️ Security Analysis Summary" >> $GITHUB_STEP_SUMMARY
          cat parent-reports/sast.txt >> $GITHUB_STEP_SUMMARY
          cat parent-reports/sca.txt >> $GITHUB_STEP_SUMMARY