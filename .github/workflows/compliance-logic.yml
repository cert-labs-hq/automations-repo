name: Compliance Reporting

on:
  workflow_call:
    inputs:
      report-artifact-name:
        description: "The name of the artifact containing compliance reports"
        type: string
        required: true

jobs:
  analyze-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact from Parent
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #v8.0.0
        with:
          name: compliance-data
          # This is the "magic" input for workflow_run
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: parent-reports

      - name: Process Reports
        run: |
          echo "### 🛡️ Security Analysis Summary" >> $GITHUB_STEP_SUMMARY
          cat parent-reports/sast.txt >> $GITHUB_STEP_SUMMARY
          cat parent-reports/sca.txt >> $GITHUB_STEP_SUMMARY