name: use action JS
on: [workflow_dispatch] # workflow_dispatch allows manual triggers in the UI


jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Mandatory for local actions

    - name: Run our custom action
      id: versioning # You need an ID to capture outputs
      uses: ./.github/actions/hello-js
      with:
        who-to-greet: 'Cristian' # This input is defined in action.yml
    
          # Use the output from the `hello` step
    - name: Get the output time
      run: echo "The time was ${{ steps.versioning.outputs.time }}"
