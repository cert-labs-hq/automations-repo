name: use action
on: [workflow_dispatch] # workflow_dispatch allows manual triggers in the UI


jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Mandatory for local actions

    - name: Run our custom action
      id: versioning # You need an ID to capture outputs
      uses: ./.github/actions/get-version
