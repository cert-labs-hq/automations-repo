name: Reusable workflow
on: 
    workflow_call:
      inputs:
        ref_name:
          description: 'The ref name to use as an environment variable'
          type: string
          required: true
      secrets:
        TOP_SECRET:
          description: 'A top secret'
          


jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Mandatory for local actions
      - name: check secret
        run: |
          the_secret=${{ secrets.TOP_SECRET }}
          echo "The secret value is $the_secret" with ${#the_secret} letters
          echo "The ref name is ${{ inputs.ref_name }}"
          
      - name: Verify Versioning Ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }} # Map to env var here
        run: |
          echo "This workflow is running from: $WORKFLOW_REF"
          
          # Use the env var in the comparison
          if [[ "$WORKFLOW_REF" == *"refs/tags/"* ]]; then
            echo "✅ SUCCESS: Running from a stable Tag."
          else
            echo "⚠️ WARNING: Running from a Branch (unstable)."
          fi