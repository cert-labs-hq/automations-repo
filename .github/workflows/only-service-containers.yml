name: Test Version Action
on: [workflow_dispatch] 

jobs:
  test-database:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # 🛡️ Health Check: This ensures the DB is ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Verify DB is Ready
        run: |
          # Now you don't need 'sleep' or manual retry logic!
          sudo apt-get update && sudo apt-get install -y postgresql-client
          pg_isready -h localhost -p 5432