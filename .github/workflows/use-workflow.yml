name: Use workflow
on: [workflow_dispatch] # workflow_dispatch allows manual triggers in the UI

env:
  MY_GLOBAL_ENV_VAR: ${{github.repositoryUrl}}
  DAY_OF_WEEK: Monday
  MY_ENV_VAR: ${{github.ref}}

jobs:
  debug-env:
    runs-on: "ubuntu-latest"
    steps:
      - name: debug env
        run: |
          echo "$MY_ENV_VAR" 
  call-reusable-workflow:
    uses: ./.github/workflows/reusable-workflow.yml
    secrets: inherit
    with:
      ref_name: ${{ github.ref_name }} #This can't be a environment variable because is not evaluated yet when 
      # it passes to the external workflow